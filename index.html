<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Evol-Econ Sim</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0c10; color: #c5d1e0; }
    canvas { 
      background: #11151f; 
      border: 1px solid #1e2d3d;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body class="p-6">
  <div class="max-w-5xl mx-auto">
    <div class="flex items-center gap-4 mb-4">
      <h1 class="text-2xl font-semibold text-white">Evol-Econ Sim</h1>
      <div class="text-sm text-slate-400">v0.1 — Bare Survival</div>
      <div class="ml-auto flex gap-2">
        <button onclick="toggleSim()" 
                class="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-sm">
          Pause / Resume
        </button>
        <button onclick="resetSim()" 
                class="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-sm">
          Reset
        </button>
      </div>
    </div>

    <canvas id="canvas" width="800" height="600" class="rounded"></canvas>

    <div class="mt-3 text-sm text-slate-400">
      <strong>Current Phase:</strong> v0.1 Foundation — Bare Survival<br>
      Agents move, get hungry, eat food, and can die from starvation.
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let agents = [];
    let food = [];
    let tick = 0;
    let running = true;

    const NUM_AGENTS = 100;
    const NUM_FOOD = 70;

    class Agent {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 1.5;
        this.vy = (Math.random() - 0.5) * 1.5;
        this.food = 18 + Math.random() * 12;
        this.hunger = 0;
      }

      update() {
        // Basic random movement
        this.vx += (Math.random() - 0.5) * 0.5;
        this.vy += (Math.random() - 0.5) * 0.5;

        // Speed limit
        const speed = Math.hypot(this.vx, this.vy);
        if (speed > 2) {
          this.vx = (this.vx / speed) * 2;
          this.vy = (this.vy / speed) * 2;
        }

        this.x += this.vx;
        this.y += this.vy;

        // Wrap around edges
        if (this.x < 0) this.x = canvas.width;
        if (this.x > canvas.width) this.x = 0;
        if (this.y < 0) this.y = canvas.height;
        if (this.y > canvas.height) this.y = 0;

        // Hunger (stronger)
        this.hunger += 0.055;

        // Die
        if (this.hunger > 100) return false;

        // Consume carried food (less relief)
        if (this.food > 0 && this.hunger > 10) {
          const eat = Math.min(0.7, this.food);
          this.food -= eat;
          this.hunger = Math.max(0, this.hunger - 1.3);
        }

        return true;
      }

      draw() {
        const size = 3 + Math.sqrt(Math.max(0, this.food)) * 0.3;

        ctx.fillStyle = this.hunger > 75 ? '#f87171' : '#64748b';
        ctx.beginPath();
        ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
        ctx.fill();

        // Small food dot
        if (this.food > 6) {
          ctx.fillStyle = '#fbbf24';
          ctx.beginPath();
          ctx.arc(this.x + 1.5, this.y - 1.5, 1.2, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function spawnFood(count) {
      for (let i = 0; i < count; i++) {
        food.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          amount: 3 + Math.random() * 5
        });
      }
    }

    function init() {
      agents = [];
      food = [];

      for (let i = 0; i < NUM_AGENTS; i++) {
        agents.push(new Agent());
      }

      spawnFood(NUM_FOOD);
    }

    function update() {
      if (!running) return;

      tick++;

      // Update agents
      const alive = [];
      for (let agent of agents) {
        if (agent.update()) alive.push(agent);
      }
      agents = alive;

      // Agents eat nearby food (less relief)
      for (let i = food.length - 1; i >= 0; i--) {
        const f = food[i];
        let eaten = false;

        for (let agent of agents) {
          const dx = f.x - agent.x;
          const dy = f.y - agent.y;
          if (dx * dx + dy * dy < 20 * 20 && f.amount > 0.2) {
            const eat = Math.min(1.0, f.amount);
            agent.food += eat;
            f.amount -= eat;
            agent.hunger = Math.max(0, agent.hunger - 1.9);
            eaten = true;
            break;
          }
        }

        if (f.amount < 0.2 || eaten) {
          food.splice(i, 1);
        }
      }

      // Slow food respawn
      if (tick % 10 === 0 && food.length < NUM_FOOD * 0.6) {
        spawnFood(1);
      }
    }

    function draw() {
      ctx.fillStyle = 'rgba(17, 21, 31, 0.9)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Food
      ctx.fillStyle = '#4ade80';
      for (let f of food) {
        const r = Math.sqrt(f.amount) * 0.7;
        ctx.beginPath();
        ctx.arc(f.x, f.y, r, 0, Math.PI * 2);
        ctx.fill();
      }

      // Agents
      for (let agent of agents) {
        agent.draw();
      }
    }

    function updateStats() {
      if (tick % 60 === 0) {
        console.log(`Tick: ${tick} | Agents: ${agents.length} | Food: ${food.length}`);
      }
    }

    function gameLoop() {
      update();
      draw();
      updateStats();
      requestAnimationFrame(gameLoop);
    }

    function resetSim() {
      tick = 0;
      init();
    }

    function toggleSim() {
      running = !running;
    }

    function start() {
      init();
      gameLoop();
    }

    start();
  </script>
</body>
</html>
