name: restore-full-index

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: Public URL of the complete index.html bytes
        required: true
        type: string
      target_branch:
        description: Branch to restore files onto
        required: true
        type: string
        default: feat/0.7.0-run-compare
      expected_sha256:
        description: Expected sha256 of the downloaded file
        required: true
        type: string
        default: 310cc6d3584a666c897069ae347b5e55c45986c7bcbf08a8f64f5cf5a6ff9d55

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}

      - name: Download full index.html and write archive snapshots
        env:
          SOURCE_URL: ${{ inputs.source_url }}
          EXPECTED_SHA256: ${{ inputs.expected_sha256 }}
        run: |
          set -euo pipefail
          curl -fsSL "$SOURCE_URL" -o index.html
          actual=$(sha256sum index.html | awk '{print $1}')
          echo "downloaded_bytes=$(wc -c < index.html)"
          echo "sha256=$actual"
          test "$actual" = "$EXPECTED_SHA256"
          grep -q 'function start(' index.html
          grep -q 'function initHungerSliders' index.html
          grep -q 'function resetSim' index.html
          grep -q 'function toggleSim' index.html
          grep -q 'function computeOverallStats' index.html
          grep -q 'v0.7.0-run-compare' index.html
          ! grep -q '\[Full content' index.html
          ! grep -q '\[full from previous\]' index.html
          mkdir -p archive
          cp index.html archive/index-0.5.0-phase-rail.html
          cp index.html archive/index-0.6.0-run-setup.html
          cp index.html archive/index-0.7.0-run-compare.html

      - name: Commit and push restored files
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html archive/index-0.5.0-phase-rail.html archive/index-0.6.0-run-setup.html archive/index-0.7.0-run-compare.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "fix: restore full working index.html and archive snapshots (prior MCP pushes truncated/placeholder content)"
          git push origin "HEAD:${{ inputs.target_branch }}"
